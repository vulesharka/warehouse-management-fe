<div class="login-wrapper">
  <div class="login-left">
    <div class="brand">
      <mat-icon class="brand-icon">warehouse</mat-icon>
      <h1>Warehouse Management</h1>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box">
      <h2>Sign in</h2>
      <p class="subtitle">Enter your credentials to continue</p>

      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix>person_outline</mat-icon>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error *ngIf="form.get('username')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        @if (errorMessage) {
          <div class="error-box">
            <mat-icon>error_outline</mat-icon>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <button mat-raised-button color="primary" type="submit"
                class="full-width login-btn" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Sign In
          }
        </button>

      </form>
    </div>
  </div>
</div>
