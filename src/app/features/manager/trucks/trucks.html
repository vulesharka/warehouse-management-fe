<app-navbar />

<div class="container">
  <div class="page-header">
    <h2 class="page-title">Trucks</h2>
    <button mat-raised-button color="primary" (click)="openAdd()">
      <mat-icon>add</mat-icon> Add Truck
    </button>
  </div>

  <mat-progress-bar mode="indeterminate" *ngIf="loading" />

  <mat-table [dataSource]="trucks" class="data-table">

    <ng-container matColumnDef="licensePlate">
      <mat-header-cell *matHeaderCellDef>License Plate</mat-header-cell>
      <mat-cell *matCellDef="let t">{{ t.licensePlate }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="chassisNumber">
      <mat-header-cell *matHeaderCellDef>Chassis Number</mat-header-cell>
      <mat-cell *matCellDef="let t">{{ t.chassisNumber }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="containerVolume">
      <mat-header-cell *matHeaderCellDef>Volume (m³)</mat-header-cell>
      <mat-cell *matCellDef="let t">{{ t.containerVolume }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let t">
        <button mat-icon-button matTooltip="Edit" (click)="openEdit(t)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteTruck(t.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">No trucks found</td>
    </tr>
  </mat-table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPageChange($event)" />
</div>
