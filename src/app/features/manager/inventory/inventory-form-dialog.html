<h2 mat-dialog-title>{{ isEdit ? 'Edit Item' : 'New Item' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error>Required</mat-error>
    </mat-form-field>

    <div class="row-fields">
      <mat-form-field appearance="outline">
        <mat-label>Quantity</mat-label>
        <input matInput type="number" formControlName="quantity" min="0" />
        <mat-error>Min 0</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Unit Price</mat-label>
        <input matInput type="number" formControlName="unitPrice" min="0" />
        <mat-error>Min 0</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Package Volume</mat-label>
        <input matInput type="number" formControlName="packageVolume" min="0.01" step="0.01" />
        <mat-error>Min 0.01</mat-error>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="submit()">
    {{ isEdit ? 'Update' : 'Create' }}
  </button>
</mat-dialog-actions>
